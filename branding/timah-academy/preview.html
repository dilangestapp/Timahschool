<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TIMAH ACADEMY — Branding Preview</title>
  <style>
    body{font-family:Inter,Segoe UI,Arial,sans-serif;background:#f5f7fb;color:#0e1726;margin:0;padding:24px}
    h1,h2{margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{background:white;border-radius:14px;padding:16px;border:1px solid #dbe4ff}
    .dark{background:#0b1222;color:#dbe7ff}
    img{max-width:100%;height:auto;display:block}
    .row{display:flex;gap:16px;flex-wrap:wrap}
  </style>
</head>
<body>
  <h1>TIMAH ACADEMY — Preview Identité</h1>
  <div class="grid">
    <section class="card"><h2>Concept 01</h2><img src="svg/concept-01.svg" alt="Concept 01"></section>
    <section class="card"><h2>Concept 02</h2><img src="svg/concept-02.svg" alt="Concept 02"></section>
    <section class="card"><h2>Concept 03</h2><img src="svg/concept-03.svg" alt="Concept 03"></section>
  </div>

  <h2 style="margin-top:24px">Variantes finales</h2>
  <div class="card"><img src="svg/final-horizontal-light.svg" alt="Final horizontal light"></div>
  <div class="card dark" style="margin-top:12px"><img src="svg/final-horizontal-dark.svg" alt="Final horizontal dark"></div>
  <div class="row" style="margin-top:12px">
    <div class="card" style="flex:1"><img src="svg/final-stacked-light.svg" alt="Final stacked light"></div>
    <div class="card dark" style="flex:1"><img src="svg/final-stacked-dark.svg" alt="Final stacked dark"></div>
  </div>
  <div class="row" style="margin-top:12px">
    <div class="card"><h2>Icône</h2><img src="svg/final-icon.svg" alt="Final icon" style="width:128px"></div>
    <div class="card"><h2>Favicon</h2><img src="svg/favicon.svg" alt="Favicon" style="width:64px"></div>
    <div class="card"><h2>Monochrome</h2><img src="svg/final-monochrome.svg" alt="Final monochrome"></div>
  </div>
</body>
</html>
